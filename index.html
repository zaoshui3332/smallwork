<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>&#20013;&#25991;&#22270;&#20070;&#30446;&#24405;</title>
  <meta name="description" content="Book list generated from local JSON data">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">Book Dataset</p>
        <h1>&#20013;&#25991;&#22270;&#20070;&#30446;&#24405;</h1>
      </div>
      <nav class="site-nav" aria-label="navigation">
        <a href="#book-table-section">&#22270;&#20070;&#34920;&#26684;</a>
        <a href="#category-section">&#31867;&#22411;&#32479;&#35745;</a>
        <a href="./data/books_1000_enriched.json">&#21407;&#22987;&#25968;&#25454;</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <section class="toolbar" aria-label="filters">
      <div class="metric">
        <span class="metric-label">&#24635;&#25968;&#25454;</span>
        <strong id="total-count">0</strong>
      </div>
      <div class="metric">
        <span class="metric-label">&#24403;&#21069;&#32467;&#26524;</span>
        <strong id="filtered-count">0</strong>
      </div>
      <label class="control search-control">
        <span>&#25628;&#32034;</span>
        <input id="search-input" type="search" placeholder="Title / author / year" autocomplete="off">
      </label>
      <label class="control">
        <span>&#31867;&#22411;</span>
        <select id="category-filter">
          <option value="">&#20840;&#37096;&#31867;&#22411;</option>
        </select>
      </label>
      <label class="control small-control">
        <span>&#27599;&#39029;</span>
        <select id="page-size">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </label>
    </section>

    <section id="book-table-section" class="data-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Crawler Friendly</p>
          <h2>&#22270;&#20070;&#34920;&#26684;</h2>
        </div>
        <div id="page-info" class="page-info"></div>
      </div>

      <div class="table-wrap">
        <table id="books-table" class="books-table">
          <caption>book data table</caption>
          <thead>
            <tr id="book-table-head"></tr>
          </thead>
          <tbody id="book-table-body"></tbody>
        </table>
      </div>

      <nav class="pagination" aria-label="pagination">
        <button id="prev-page" type="button">&#19978;&#19968;&#39029;</button>
        <div id="page-buttons" class="page-buttons"></div>
        <button id="next-page" type="button">&#19979;&#19968;&#39029;</button>
      </nav>
    </section>

    <section id="category-section" class="data-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Summary</p>
          <h2>&#31867;&#22411;&#32479;&#35745;</h2>
        </div>
      </div>
      <div id="category-list" class="category-list"></div>
    </section>
  </main>

  <dialog id="book-dialog" class="book-dialog">
    <article id="book-detail" class="book-detail"></article>
    <form method="dialog">
      <button type="submit">&#20851;&#38381;</button>
    </form>
  </dialog>

  <script src="./app.js" defer></script>
</body>
</html>
