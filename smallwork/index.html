<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中文图书目录</title>
  <meta name="description" content="基于本地 JSON 数据生成的中文图书目录页面">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">Book Dataset</p>
        <h1>中文图书目录</h1>
      </div>
      <nav class="site-nav" aria-label="页面导航">
        <a href="#book-table-section">图书表格</a>
        <a href="#category-section">类型统计</a>
        <a href="./data/books_1000_chinese_titles.json">原始数据</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <section class="toolbar" aria-label="筛选工具">
      <div class="metric">
        <span class="metric-label">总数据</span>
        <strong id="total-count">0</strong>
      </div>
      <div class="metric">
        <span class="metric-label">当前结果</span>
        <strong id="filtered-count">0</strong>
      </div>
      <label class="control search-control">
        <span>搜索</span>
        <input id="search-input" type="search" placeholder="书名或作者" autocomplete="off">
      </label>
      <label class="control">
        <span>类型</span>
        <select id="category-filter">
          <option value="">全部类型</option>
        </select>
      </label>
      <label class="control small-control">
        <span>每页</span>
        <select id="page-size">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </label>
    </section>

    <section id="book-table-section" class="data-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Crawler Friendly</p>
          <h2>图书表格</h2>
        </div>
        <div id="page-info" class="page-info">第 1 页</div>
      </div>

      <div class="table-wrap">
        <table id="books-table" class="books-table">
          <caption>中文图书数据表</caption>
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">书名</th>
              <th scope="col">作者</th>
              <th scope="col">类型</th>
              <th scope="col">价格</th>
              <th scope="col">详情</th>
            </tr>
          </thead>
          <tbody id="book-table-body"></tbody>
        </table>
      </div>

      <nav class="pagination" aria-label="分页">
        <button id="prev-page" type="button">上一页</button>
        <div id="page-buttons" class="page-buttons"></div>
        <button id="next-page" type="button">下一页</button>
      </nav>
    </section>

    <section id="category-section" class="data-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Summary</p>
          <h2>类型统计</h2>
        </div>
      </div>
      <div id="category-list" class="category-list"></div>
    </section>
  </main>

  <dialog id="book-dialog" class="book-dialog">
    <article id="book-detail" class="book-detail"></article>
    <form method="dialog">
      <button type="submit">关闭</button>
    </form>
  </dialog>

  <template id="book-row-template">
    <tr class="book-row">
      <td class="book-id"></td>
      <td class="book-title"></td>
      <td class="book-author"></td>
      <td class="book-category"></td>
      <td class="book-price"></td>
      <td><button class="detail-button" type="button">查看</button></td>
    </tr>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
